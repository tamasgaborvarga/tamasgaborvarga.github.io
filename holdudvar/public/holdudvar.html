<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Holdudvar Vendégház Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="records.js"></script>
<script src="apartments.js"></script>
<style>
  :root{--bg:#F7F5F1;--card:#FFFFFF;--ink:#21302E;--muted:#71807D;--teal:#1F5F60;--teal-soft:#3E8487;--terra:#C8794A;--line:#E8E3DA;--up:#2E7D5B;--down:#B3543C}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1140px;margin:0 auto;padding:34px 22px 64px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal-soft);font-weight:600}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:34px;margin:4px 0 8px;letter-spacing:-.015em}
  .lede{font-size:14px;color:var(--muted);margin:0 0 14px}
  .insight{font-size:15px;line-height:1.6;color:#3B4A48;max-width:780px;margin:0}
  .insight b{color:var(--ink)}
  .seg{display:inline-flex;background:#EFece5;border-radius:9px;padding:3px}
  .seg button{padding:6px 12px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);border:0;background:transparent}
  .seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08);font-weight:600}
  .langseg button{padding:5px 10px;font-size:12px}
  .controls{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin:24px 0 6px;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px}
  .cgroup{display:flex;align-items:center;gap:8px}
  .lbl-sm{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 11px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;user-select:none}
  .chip.off{opacity:.35}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0 18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .kpi .lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .kpi .val{font-family:'Space Grotesk',sans-serif;font-size:25px;font-weight:600;margin-top:6px;line-height:1.1}
  .kpi .delta{font-size:12px;margin-top:6px;font-weight:600}
  .kpi .delta .ctx{color:var(--muted);font-weight:400}
  .up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--muted)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .panel .ph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .panel h3{margin:0;font-size:15px;font-weight:600}
  .panel .hint{font-size:12px;color:var(--muted);margin:0 0 12px}
  .row{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
  .takeaways{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:8px 0 6px}
  .take{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:10px;padding:13px 15px;font-size:13px;line-height:1.5;color:#3B4A48}
  .take b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-soft);margin-bottom:4px}
  .sect{margin:34px 0 8px;padding-top:18px;border-top:1px solid var(--line)}
  .sect h2{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;margin:0}
  .chartbox{position:relative}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--muted);margin-top:10px}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  footer{margin-top:26px;font-size:12px;color:var(--muted)}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.takeaways{grid-template-columns:1fr}h1{font-size:27px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="eyebrow" id="eyebrow"></div>
      <h1>Holdudvar Vendégház Analytics</h1>
      <p class="lede" id="lede"></p>
    </div>
    <div class="seg langseg" id="langseg">
      <button data-l="en">EN</button><button data-l="hu">HU</button>
    </div>
  </div>
  <p class="insight" id="insight"></p>

  <div class="controls">
    <div class="cgroup"><span class="lbl-sm" id="lblSeasons"></span><span id="yearChips" style="display:flex;gap:6px;flex-wrap:wrap"></span></div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="takeaways">
    <div class="take"><b id="take1Label"></b><span id="take1"></span></div>
    <div class="take"><b id="take2Label"></b><span id="take2"></span></div>
    <div class="take"><b id="take3Label"></b><span id="take3"></span></div>
  </div>

  <div class="sect"><h2 id="sectDemand"></h2></div>

  <div class="panel">
    <div class="ph"><h3 id="heroTitle"></h3><span class="lbl-sm" id="heroMetric"></span></div>
    <p class="hint" id="heroHint"></p>
    <div class="chartbox" style="height:400px"><canvas id="hero"></canvas></div>
  </div>

  <div class="panel">
    <div class="ph"><h3 id="occTitle"></h3></div>
    <p class="hint" id="occHint"></p>
    <div id="occGrid" style="display:grid;gap:4px"></div>
    <div id="occScale" style="margin-top:10px"></div>
    <p class="hint" id="occNote" style="margin-top:12px"></p>
  </div>

  <div class="sect"><h2 id="sectChannels"></h2></div>

  <div class="row">
    <div class="panel">
      <div class="ph"><h3 id="mixTitle"></h3></div>
      <p class="hint" id="mixHint"></p>
      <div class="chartbox" style="height:230px"><canvas id="mix"></canvas></div>
      <div class="legend" id="mixLegend"></div>
    </div>
    <div class="panel">
      <div class="ph"><h3 id="profTitle"></h3></div>
      <p class="hint" id="profHint"></p>
      <div class="chartbox" style="height:230px"><canvas id="prof"></canvas></div>
      <div class="legend" id="profLegend"></div>
    </div>
  </div>

  <div class="panel">
    <div class="ph"><h3 id="retTitle"></h3></div>
    <p class="hint" id="retHint"></p>
    <div class="chartbox" style="height:210px"><canvas id="ret"></canvas></div>
    <p class="hint" id="retNote" style="margin-top:10px"></p>
  </div>

  <div class="sect"><h2 id="sectProfile"></h2></div>

  <div class="row">
    <div class="panel">
      <div class="ph"><h3 id="secTitle"></h3></div>
      <p class="hint" id="secHint"></p>
      <div class="chartbox" style="height:230px"><canvas id="sec"></canvas></div>
    </div>
    <div class="panel">
      <div class="ph"><h3 id="grpTitle"></h3></div>
      <p class="hint" id="grpHint"></p>
      <div class="chartbox" style="height:230px"><canvas id="grp"></canvas></div>
    </div>
  </div>

  <div class="sect"><h2 id="sectApartments"></h2></div>

  <div class="panel">
    <div class="ph"><h3 id="aptTitle"></h3></div>
    <p class="hint" id="aptHint"></p>
    <div class="chartbox" style="height:210px"><canvas id="aptChart"></canvas></div>
    <p class="hint" id="aptNote" style="margin-top:12px"></p>
  </div>

  <p class="hint" id="meth" style="margin-top:6px;font-size:11.5px;line-height:1.5"></p>

  <footer id="footer"></footer>
</div>

<script>
const DATA=(window.HOLDUDVAR_DATA||[]);
const YEARS=[...new Set(DATA.map(b=>b.ev))].sort();
const MN=[3,4,5,6,7,8,9,10];
const YCOL={2021:'#9C9C9C',2022:'#B8923A',2023:'#7B6CA8',2024:'#4F86B0',2025:'#CC5B4C',2026:'#4E8C5A'};
const TEAL='#1F5F60', TERRA='#C8794A';

const T={
  en:{
    eyebrow:'Hospitality analytics · self-collected data',
    lede:'Our guesthouse’s booking data · 2021–2026',
    metric:'Metric', seasons:'Seasons', mNights:'Guest-nights', mBookings:'Bookings',
    months:{3:'Mar',4:'Apr',5:'May',6:'Jun',7:'Jul',8:'Aug',9:'Sep',10:'Oct'},
    mname:{nights:'Guest-nights',count:'Bookings'}, mlow:{nights:'guest-nights',count:'bookings'},
    peak:'PEAK SEASON', perMonth:'/ month', like:'like months',
    kpiBookings:'Bookings', kpiNights:'Guest-nights', kpiLOS:'Avg length of stay', kpiDirect:'Direct share', unitNights:'nights',
    heroTitle:'Seasonal comparison',
    heroHint:'Each line is one season. Overlaying the months shows where and how much demand differs year over year — the grey band marks peak season (Jul–Aug).',
    mixTitle:'Channel mix by season',
    mixHint:'Direct vs. Szállás.hu (OTA) share each year. Direct bookings carry no commission — a higher share protects margin.',
    direct:'Direct', ota:'Szállás.hu (OTA)',
    secTitle:'Length of stay', secHint:'Share of bookings by number of nights — mostly short, weekend-length stays.', tipNights:'nights', guestsAxis:'guests',
    retTitle:'Returning guests', retHint:'Share of bookings from guests who stayed before (matched by name across years — approximate, a lower bound).', retTip:'returning',
    retNote:(rd,nd)=>`Returning guests book <b>direct</b> far more often (${rd}% vs ${nd}% for new guests) — loyalty becomes commission-free, higher-margin demand.`,
    grpTitle:'Group size', grpHint:'Guests per booking. Couples dominate; large / whole-house groups are rare but high-value.',
    meth:'Occupancy = booked apartment-nights ÷ capacity (3 apartments × days in the month; fully open Apr–Oct). Returning guests are identified by name recurrence across years (approximate — spelling variants undercount). 2026 is a partial season.',
    take1Label:'Seasonality', take1:'Peak season (Jul–Aug) runs near full; the shoulder months (May, Sep, Oct) are the real growth headroom.',
    take2Label:'Channels & loyalty', take2:'Repeat guests book direct far more often — loyalty turns into commission-free, higher-margin demand.',
    take3Label:'Demand shape', take3:'Couples and short stays dominate; whole-house bookings are few but punch well above their weight.',
    sectDemand:'Demand & seasonality', sectChannels:'Channels & loyalty', sectProfile:'Booking profile', sectApartments:'Apartments',
    profTitle:'Who books each channel?',
    profHint:'Direct guests book larger groups and are far more likely to rent the whole house; the OTA channel (Szállás.hu) skews to couples. So direct demand is valuable beyond the saved commission — it brings the highest-value booking type.',
    wholeTip:p=>'Whole-house: '+p+'% of bookings', wholeAxis:'Whole-house share of bookings',
    avgGroup:(d,o)=>`Avg group · Direct <b>${d}</b> vs OTA <b>${o}</b> guests`,
    insight:(pk,lo,peakY,peakC,lastY,lastC,dH,dHY)=>`Six seasons of self-collected booking data. <b>Peak season (Jul–Aug)</b> drives <b>${pk}%</b> of ${lo}. Booking volume peaked in ${peakY} (${peakC}) and has softened since (${lastC} in ${lastY}), while the <b>direct</b> share reached its high of <b>${dH}%</b> in ${dHY} — the lever that protects margin.`,
    occTitle:'Occupancy by month & season',
    occHint:'Apartment-nights booked ÷ capacity (3 apartments × days in month). Self-derived from booking records.',
    occNote:'Peak months (Jul–Aug) run near 70–80% — close to full. The shoulder months (May, Sep, Oct) are the real headroom for growth. *2026 is a partial season.',
    aptTitle:'Occupancy by apartment',
    aptHint:'Each apartment’s season occupancy over the selected years (2022–2026; 2021 has no apartment-level data). Capacity: Telihold & Félhold 2–4 guests, Holdfény 4–6.',
    aptNote:'The largest unit (Holdfény) is the least filled — demand skews to the smaller apartments and to couples; Holdfény mostly fills as part of whole-house bookings.',
    footer:'Built by Tamás Gábor Varga · vanilla JS + Chart.js · data self-collected 2021–2026 (2026 partial).'
  },
  hu:{
    eyebrow:'Vendéglátás-analitika · saját gyűjtésű adat',
    lede:'A vendégházunk foglalási adatai · 2021–2026',
    metric:'Mutató', seasons:'Szezonok', mNights:'Vendégéjszaka', mBookings:'Foglalás',
    months:{3:'Márc',4:'Ápr',5:'Máj',6:'Jún',7:'Júl',8:'Aug',9:'Szep',10:'Okt'},
    mname:{nights:'Vendégéjszaka',count:'Foglalás'}, mlow:{nights:'vendégéjszaka',count:'foglalás'},
    peak:'CSÚCSSZEZON', perMonth:'/ hónap', like:'azonos hónapok',
    kpiBookings:'Foglalás', kpiNights:'Vendégéjszaka', kpiLOS:'Átlagos tartózkodás', kpiDirect:'Direkt arány', unitNights:'éj',
    heroTitle:'Szezonális összehasonlítás',
    heroHint:'Minden vonal egy szezon. A hónapok egymásra vetítve mutatják, hol és mekkora az eltérés év/év — a szürke sáv a csúcsszezon (júl–aug).',
    mixTitle:'Csatorna-megoszlás szezononként',
    mixHint:'Direkt vs. Szállás.hu (OTA) arány évről évre. A direkt foglalás jutalékmentes — minél magasabb, annál jobb az árrés.',
    direct:'Direkt', ota:'Szállás.hu (OTA)',
    secTitle:'Tartózkodás hossza', secHint:'A foglalások megoszlása éjszakaszám szerint — többségében rövid, hétvégés.', tipNights:'éj', guestsAxis:'fő',
    retTitle:'Visszatérő vendégek', retHint:'A korábban már nálunk járt vendégek aránya (név-egyezés évek között — közelítő, alsó becslés).', retTip:'visszatérő',
    retNote:(rd,nd)=>`A visszatérő vendégek sokkal gyakrabban foglalnak <b>direktben</b> (${rd}% vs ${nd}% az újaknál) — vagyis jutalékmentesen, magasabb árréssel.`,
    grpTitle:'Csoportméret', grpHint:'Vendégszám foglalásonként. A párok dominálnak; a nagy / egész-házas csoport ritka, de értékes.',
    meth:'Kihasználtság = lefoglalt apartman-éjszaka ÷ kapacitás (3 apartman × hónap napjai; ápr–okt végig nyitva). A visszatérő vendég név-ismétlésből (közelítő — elírások miatt alsó becslés). A 2026 részleges szezon.',
    take1Label:'Szezonalitás', take1:'A csúcsszezon (júl–aug) közel teltház; a növekedés tartaléka a holtszezon (máj, szep, okt).',
    take2Label:'Csatornák és hűség', take2:'A visszatérő vendégek jóval gyakrabban foglalnak direktben — vagyis jutalékmentesen, magasabb árréssel.',
    take3Label:'Keresleti profil', take3:'Többségében párok, rövid tartózkodással; az egész ház kiadása ritka, de ezek a legnagyobb foglalások.',
    sectDemand:'Kereslet és szezonalitás', sectChannels:'Csatornák és hűség', sectProfile:'Foglalási profil', sectApartments:'Apartmanok',
    profTitle:'Ki melyik csatornán foglal?',
    profHint:'A direkt vendégek nagyobb csoportban érkeznek, és sokkal gyakrabban bérlik az egész házat; az OTA (Szállás.hu) inkább a párokat hozza. A direkt kereslet a jutalékon túl is értékes — a legértékesebb foglalástípust hozza.',
    wholeTip:p=>'Egész ház: '+p+'% a foglalásokból', wholeAxis:'Egész-ház arány a foglalásokból',
    avgGroup:(d,o)=>`Átlag csoport · Direkt <b>${d}</b> vs OTA <b>${o}</b> fő`,
    insight:(pk,lo,peakY,peakC,lastY,lastC,dH,dHY)=>`Hat szezon saját gyűjtésű foglalási adata. A <b>csúcsszezon (júl–aug)</b> a ${lo} <b>${pk}%</b>-át adja. A foglalási volumen ${peakY}-ban tetőzött (${peakC}), azóta csökkent (${lastC} ${lastY}-ben), miközben a <b>direkt</b> arány ${dHY}-ben érte el a csúcsát (<b>${dH}%</b>) — ez védi az árrést.`,
    occTitle:'Kihasználtság hónap és szezon szerint',
    occHint:'Lefoglalt apartman-éjszaka ÷ kapacitás (3 apartman × hónap napjai). Saját számítás a foglalásokból.',
    occNote:'A csúcshónapok (júl–aug) ~70–80% — közel teltház. A növekedés tartaléka a holtszezon (máj, szep, okt). *A 2026 részleges szezon.',
    aptTitle:'Kihasználtság apartmanonként',
    aptHint:'Az egyes apartmanok szezon-kihasználtsága a kiválasztott években (2022–2026; 2021-re nincs apartman-szintű adat). Kapacitás: Telihold és Félhold 2–4 fő, Holdfény 4–6 fő.',
    aptNote:'A legnagyobb egység (Holdfény) telik a legkevésbé — a kereslet a kisebb apartmanok és a párok felé húz; a Holdfény főleg egész-házas foglalással telik meg.',
    footer:'Készítette: Varga Tamás Gábor · vanilla JS + Chart.js · saját gyűjtésű adat 2021–2026 (2026 részleges).'
  }
};

let lang=localStorage.getItem('holdudvar_lang')||'en';
let metric='nights', enabled=new Set(YEARS), hero,mix,sec,prof,apt,ret,grp;
const tr=()=>T[lang];
const sum=(a,f)=>a.reduce((s,b)=>s+f(b),0);
const NI=b=>b.nights;
const mval=rows=> metric==='count'?rows.length : sum(rows,NI);
const activeMonths=y=>MN.filter(m=>DATA.some(b=>b.ev===y&&b.honap===m));
const rowsYM=(y,ms)=>DATA.filter(b=>b.ev===y&&ms.includes(b.honap));
const DAYS={3:31,4:30,5:31,6:30,7:31,8:31,9:30,10:31};
const occ=(y,m)=>{const cap=3*DAYS[m];const an=DATA.filter(b=>b.ev===y&&b.honap===m).reduce((s,b)=>s+b.nights*b.aptn,0);return cap?an/cap*100:0;};
const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
const occColor=p=>{const t=Math.min(p,100)/100;return `rgb(${lerp(242,31,t)},${lerp(239,95,t)},${lerp(234,96,t)})`;};
function buildOcc(){const t=tr();
  document.getElementById('occTitle').textContent=t.occTitle;
  document.getElementById('occHint').textContent=t.occHint;
  document.getElementById('occNote').textContent=t.occNote;
  const ys=YEARS.filter(y=>enabled.has(y));
  const g=document.getElementById('occGrid');
  g.style.gridTemplateColumns=`46px repeat(${MN.length},1fr)`;
  let html=`<div></div>`+MN.map(m=>`<div style="text-align:center;font-size:11px;color:var(--muted)">${t.months[m]}</div>`).join('');
  for(const y of ys){html+=`<div style="font-size:12px;color:var(--muted);display:flex;align-items:center">${y}${y===2026?'*':''}</div>`;
    html+=MN.map(m=>{const p=Math.round(occ(y,m));const tc=p>45?'#fff':'#42514E';
      return `<div title="${y} ${t.months[m]}: ${p}%" style="background:${occColor(p)};color:${tc};border-radius:6px;padding:9px 0;text-align:center;font-size:12px;font-weight:600">${p}%</div>`;}).join('');
  }
  g.innerHTML=html;
  document.getElementById('occScale').innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)"><span>0%</span><span style="flex:1;max-width:200px;height:9px;border-radius:5px;background:linear-gradient(90deg,${occColor(0)},${occColor(50)},${occColor(100)})"></span><span>100%</span></div>`;
}

const peakBand={id:'peakBand',beforeDatasetsDraw(c){const{ctx,chartArea:a,scales:{x}}=c;if(!x)return;
  const J=tr().months[7],A=tr().months[8];const x1=x.getPixelForValue(J),x2=x.getPixelForValue(A);
  const l=Math.min(x1,x2)-x.width/14,r=Math.max(x1,x2)+x.width/14;
  ctx.save();ctx.fillStyle='rgba(33,48,46,.045)';ctx.fillRect(l,a.top,r-l,a.bottom-a.top);
  ctx.fillStyle='rgba(33,48,46,.30)';ctx.font='600 10px Inter';ctx.fillText(tr().peak,l+6,a.top+13);ctx.restore();}};

function deltaHTML(cur,prev,opts={}){
  if(prev==null||prev===0){return `<span class="flat">— <span class="ctx">${opts.ctx||''}</span></span>`;}
  if(opts.pp!=null){const d=opts.pp;const cls=d>0.5?'up':d<-0.5?'down':'flat';const ar=d>0.5?'▲':d<-0.5?'▼':'▬';
    return `<span class="${cls}">${ar} ${d>0?'+':''}${d.toFixed(0)} pp <span class="ctx">${opts.ctx||''}</span></span>`;}
  const p=(cur-prev)/prev*100;const cls=p>1?'up':p<-1?'down':'flat';const ar=p>1?'▲':p<-1?'▼':'▬';
  return `<span class="${cls}">${ar} ${p>0?'+':''}${p.toFixed(0)}% <span class="ctx">${opts.ctx||''}</span></span>`;
}

function applyStatic(){
  const t=tr();
  document.documentElement.lang=lang;
  document.getElementById('eyebrow').textContent=t.eyebrow;
  document.getElementById('lede').textContent=t.lede;
  document.getElementById('lblSeasons').textContent=t.seasons;
  document.getElementById('heroTitle').textContent=t.heroTitle;
  document.getElementById('heroHint').textContent=t.heroHint;
  document.getElementById('mixTitle').textContent=t.mixTitle;
  document.getElementById('mixHint').textContent=t.mixHint;
  document.getElementById('mixLegend').innerHTML=`<span><span class="dot" style="background:#1F5F60"></span>${t.direct}</span><span><span class="dot" style="background:#C8794A"></span>${t.ota}</span>`;
  document.getElementById('secTitle').textContent=t.secTitle;
  document.getElementById('secHint').textContent=t.secHint;
  document.getElementById('profTitle').textContent=t.profTitle;
  document.getElementById('profHint').textContent=t.profHint;
  document.getElementById('footer').textContent=t.footer;
  document.querySelectorAll('#langseg button').forEach(b=>b.classList.toggle('active',b.dataset.l===lang));
  document.getElementById('aptTitle').textContent=tr().aptTitle;
  document.getElementById('aptHint').textContent=tr().aptHint;
  document.getElementById('aptNote').textContent=tr().aptNote;
  document.getElementById('retTitle').textContent=t.retTitle;
  document.getElementById('retHint').textContent=t.retHint;
  document.getElementById('grpTitle').textContent=t.grpTitle;
  document.getElementById('grpHint').textContent=t.grpHint;
  document.getElementById('meth').textContent=t.meth;
  ['take1Label','take1','take2Label','take2','take3Label','take3','sectDemand','sectChannels','sectProfile','sectApartments'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
}

function render(){
  const t=tr();
  const on=YEARS.filter(y=>enabled.has(y));
  const fy=on.length?Math.max(...on):YEARS[YEARS.length-1];
  const py=fy-1, ms=activeMonths(fy);
  const cur=rowsYM(fy,ms), prev=DATA.some(b=>b.ev===py)?rowsYM(py,ms):null;
  const ctx=`${fy} vs ${py}${ms.length<8?' ('+t.like+')':''}`;
  const ni=sum(cur,NI), pni=prev?sum(prev,NI):null;
  const bk=cur.length, pbk=prev?prev.length:null;
  const los=bk?ni/bk:0, plos=(prev&&pbk)?pni/pbk:null;
  const dsh=bk?cur.filter(b=>b.csatorna==='Privát').length/bk*100:0;
  const pdsh=(prev&&pbk)?prev.filter(b=>b.csatorna==='Privát').length/pbk*100:null;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="lbl">${t.kpiBookings} · ${fy}</div><div class="val">${bk}</div><div class="delta">${deltaHTML(bk,pbk,{ctx})}</div></div>
    <div class="kpi"><div class="lbl">${t.kpiNights} · ${fy}</div><div class="val">${ni}</div><div class="delta">${deltaHTML(ni,pni,{ctx})}</div></div>
    <div class="kpi"><div class="lbl">${t.kpiLOS}</div><div class="val">${los.toFixed(1)} <span style="font-size:14px;color:var(--muted)">${t.unitNights}</span></div><div class="delta">${deltaHTML(los,plos,{ctx})}</div></div>
    <div class="kpi"><div class="lbl">${t.kpiDirect}</div><div class="val">${dsh.toFixed(0)}%</div><div class="delta">${deltaHTML(dsh,pdsh,{pp:pdsh!=null?dsh-pdsh:null,ctx})}</div></div>`;
  const allOn=DATA.filter(b=>enabled.has(b.ev));
  const peak=mval(allOn.filter(b=>b.honap===7||b.honap===8)), tot=mval(allOn)||1;
  const ds=y=>{const r=DATA.filter(b=>b.ev===y);return r.length?r.filter(b=>b.csatorna==='Privát').length/r.length*100:0;};
  const cnt=y=>DATA.filter(b=>b.ev===y).length;
  const fullY=YEARS.filter(y=>y<2026);
  let peakY=fullY[0]; fullY.forEach(y=>{if(cnt(y)>cnt(peakY))peakY=y;});
  let dHY=fullY[0]; fullY.forEach(y=>{if(ds(y)>ds(dHY))dHY=y;});
  const lastY=Math.max(...fullY);
  document.getElementById('insight').innerHTML=t.insight(Math.round(peak/tot*100),t.mlow[metric],peakY,cnt(peakY),lastY,cnt(lastY),Math.round(ds(dHY)),dHY);
  document.getElementById('heroMetric').textContent=t.mname[metric]+' '+t.perMonth;
  const datasets=on.map(y=>({label:String(y),data:MN.map(m=>mval(DATA.filter(b=>b.ev===y&&b.honap===m))),
     borderColor:YCOL[y],backgroundColor:YCOL[y],borderWidth:y===fy?3.2:1.8,tension:.35,pointRadius:y===fy?3:2,pointHoverRadius:5}));
  if(hero)hero.destroy();
  hero=new Chart(document.getElementById('hero'),{type:'line',data:{labels:MN.map(m=>t.months[m]),datasets},plugins:[peakBand],
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',onClick:()=>{},labels:{boxWidth:12,usePointStyle:true,font:{size:12}}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw} ${t.mlow[metric]}`}}},
      scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#F0ECE4'}}}}});
  const dPct=on.map(y=>{const r=DATA.filter(b=>b.ev===y);const d=mval(r.filter(b=>b.csatorna==='Privát')),o=mval(r.filter(b=>b.csatorna==='Szállás.hu'));const tt=d+o||1;return [d/tt*100,o/tt*100];});
  if(mix)mix.destroy();
  mix=new Chart(document.getElementById('mix'),{type:'bar',data:{labels:on,datasets:[
      {label:t.direct,data:dPct.map(x=>x[0]),backgroundColor:TEAL,borderRadius:3,stack:'s'},
      {label:t.ota,data:dPct.map(x=>x[1]),backgroundColor:TERRA,borderRadius:3,stack:'s'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${Math.round(c.raw)}%`}}},
      scales:{x:{grid:{display:false},stacked:true},y:{stacked:true,max:100,grid:{color:'#F0ECE4'},ticks:{callback:v=>v+'%'}}}}});
  const rowsEn=DATA.filter(b=>enabled.has(b.ev));
  const pr=rowsEn.filter(b=>b.csatorna==='Privát'), oa=rowsEn.filter(b=>b.csatorna==='Szállás.hu');
  const wh=a=>a.length?a.filter(b=>b.aptn>=2).length/a.length*100:0;
  const avgFo=a=>{const f=a.filter(b=>b.fo>0);return f.length?sum(f,b=>b.fo)/f.length:0;};
  if(prof)prof.destroy();
  prof=new Chart(document.getElementById('prof'),{type:'bar',data:{labels:[t.direct,t.ota],datasets:[{data:[wh(pr),wh(oa)],backgroundColor:[TEAL,TERRA],borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+t.wholeTip(Math.round(c.raw))}}},
      scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#F0ECE4'},ticks:{callback:v=>v+'%'},title:{display:true,text:t.wholeAxis}}}}});
  document.getElementById('profLegend').innerHTML=t.avgGroup(avgFo(pr).toFixed(1),avgFo(oa).toFixed(1));
  // Per-apartment occupancy (money-free)
  const APT=(window.HOLDUDVAR_APT||[]);
  const availY=[...new Set(APT.map(x=>x.ev))];
  const useY=YEARS.filter(y=>enabled.has(y)&&availY.includes(y));
  const SEASON=[4,5,6,7,8,9,10], seasonDays=SEASON.reduce((s,m)=>s+DAYS[m],0);
  const capTotal=(useY.length*seasonDays)||1;
  const occA=['Telihold','Félhold','Holdfény'].map(a=>APT.filter(x=>x.apt===a&&useY.includes(x.ev)&&x.honap>=4).reduce((s,x)=>s+x.nights,0)/capTotal*100);
  if(apt)apt.destroy();
  apt=new Chart(document.getElementById('aptChart'),{type:'bar',data:{labels:['Telihold (2–4)','Félhold (2–4)','Holdfény (4–6)'],datasets:[{data:occA,backgroundColor:['#1F5F60','#3E8487','#8FB7AE'],borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw.toFixed(0)+'%'}}},
      scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#F0ECE4'},ticks:{callback:v=>v+'%'}}}}});
  // Length-of-stay distribution
  const losB=['1','2','3','4','5','6','7+'];
  const losD=losB.map(k=>rowsEn.filter(b=> k==='7+'?b.nights>=7:b.nights===+k).length);
  if(sec)sec.destroy();
  sec=new Chart(document.getElementById('sec'),{type:'bar',data:{labels:losB,datasets:[{data:losD,backgroundColor:TEAL,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' '+t.mlow.count+' ('+Math.round(c.raw/(rowsEn.length||1)*100)+'%)'}}},
      scales:{x:{grid:{display:false},title:{display:true,text:t.tipNights}},y:{beginAtZero:true,grid:{color:'#F0ECE4'}}}}});
  // Group-size distribution
  const grpB=['1','2','3','4','5','6','7','8+'];
  const foRows=rowsEn.filter(b=>b.fo>0);
  const grpD=grpB.map(k=>foRows.filter(b=> k==='8+'?b.fo>=8:b.fo===+k).length);
  if(grp)grp.destroy();
  grp=new Chart(document.getElementById('grp'),{type:'bar',data:{labels:grpB,datasets:[{data:grpD,backgroundColor:'#3E8487',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' '+t.mlow.count+' ('+Math.round(c.raw/(foRows.length||1)*100)+'%)'}}},
      scales:{x:{grid:{display:false},title:{display:true,text:t.guestsAxis}},y:{beginAtZero:true,grid:{color:'#F0ECE4'}}}}});
  // Returning guests
  const retY=on.map(y=>{const r=DATA.filter(b=>b.ev===y);return r.length?r.filter(b=>b.returning).length/r.length*100:0;});
  if(ret)ret.destroy();
  ret=new Chart(document.getElementById('ret'),{type:'bar',data:{labels:on,datasets:[{data:retY,backgroundColor:on.map(y=>YCOL[y]),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+Math.round(c.raw)+'% '+t.retTip}}},
      scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#F0ECE4'},ticks:{callback:v=>v+'%'}}}}});
  const rr=rowsEn.filter(b=>b.returning), nn=rowsEn.filter(b=>!b.returning);
  const dS=a=>a.length?Math.round(a.filter(b=>b.csatorna==='Privát').length/a.length*100):0;
  document.getElementById('retNote').innerHTML=t.retNote(dS(rr),dS(nn));
  buildOcc();
}

function setLang(l){lang=l;localStorage.setItem('holdudvar_lang',l);applyStatic();render();}
document.querySelectorAll('#langseg button').forEach(b=>b.onclick=()=>setLang(b.dataset.l));
document.querySelectorAll('.mt').forEach(e=>e.onclick=()=>{metric=e.dataset.m;document.querySelectorAll('.mt').forEach(x=>x.classList.toggle('active',x===e));render()});
const chipBox=document.getElementById('yearChips');
YEARS.forEach(y=>{const c=document.createElement('span');c.className='chip';c.textContent=y;c.style.borderColor=YCOL[y];
  c.onclick=()=>{enabled.has(y)?enabled.delete(y):enabled.add(y);c.classList.toggle('off',!enabled.has(y));render()};chipBox.appendChild(c);});

applyStatic();
render();
</script>
</body>
</html>
